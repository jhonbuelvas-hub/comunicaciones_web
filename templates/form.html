<!DOCTYPE html>
<html>
<head>
<title>{{accion}}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f8fb; }
.btn-primary { background:#1d6fdc; border:none; }
</style>

</head>

<body>

<div class="container mt-4">

<h3>{{accion}} Comunicación</h3>

<form method="post">

<input type="date" name="fecha_llegada" class="form-control mb-2" value="{{c[1] if c else ''}}">

<select name="tipo" class="form-control mb-2">
<option>Enviada</option>
<option>Recibida</option>
</select>

<input type="text" name="medio" class="form-control mb-2" placeholder="Medio" value="{{c[3] if c else ''}}">
<input type="text" name="asunto" class="form-control mb-2" value="{{c[4] if c else ''}}">
<input type="text" name="emisor" class="form-control mb-2" value="{{c[5] if c else ''}}">
<input type="text" name="receptor" class="form-control mb-2" value="{{c[6] if c else ''}}">

<input type="text" name="radicado_interno" class="form-control mb-2" value="{{c[7] if c else ''}}">
<input type="text" name="radicado_externo" class="form-control mb-2" value="{{c[8] if c else ''}}">
<input type="text" name="especialidad" class="form-control mb-2" value="{{c[9] if c else ''}}">
<input type="text" name="responsable" class="form-control mb-2" value="{{c[10] if c else ''}}">

<input type="text" name="prioridad" class="form-control mb-2" value="{{c[11] if c else ''}}">
<input type="date" name="fecha_limite" class="form-control mb-2" value="{{c[12] if c else ''}}">
<input type="number" name="dias_respuesta" class="form-control mb-2" value="{{c[13] if c else ''}}">

<textarea name="observaciones" class="form-control mb-2">{{c[14] if c else ''}}</textarea>

<label>
<input type="checkbox" name="respondida" value="1" {% if c and c[15]==1 %}checked{% endif %}>
Respondida
</label>

<br><br>

<button class="btn btn-primary">Guardar</button>
<a href="/" class="btn btn-primary">Volver</a>

</form>

</div>
</body>
</html>
