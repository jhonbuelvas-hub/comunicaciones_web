<!DOCTYPE html>
<html>
<head>
<title>{{accion}} Comunicación</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3>{{accion}} Comunicación</h3>

<form method="post">

<div class="row">

<div class="col-md-3">
<label>Fecha</label>
<input type="date" name="fecha" class="form-control" value="{{c[1] if c else ''}}">
</div>

<div class="col-md-3">
<label>Fecha llegada</label>
<input type="date" name="fecha_llegada" class="form-control" value="{{c[2] if c else ''}}">
</div>

<div class="col-md-3">
<label>Tipo</label>
<select name="tipo" class="form-control">
<option>Enviada</option>
<option>Recibida</option>
</select>
</div>

<div class="col-md-3">
<label>Medio</label>
<input type="text" name="medio" class="form-control" value="{{c[4] if c else ''}}">
</div>

</div>

<br>

<input type="text" name="asunto" class="form-control mb-2" placeholder="Asunto" value="{{c[5] if c else ''}}">
<input type="text" name="emisor" class="form-control mb-2" placeholder="Emisor" value="{{c[6] if c else ''}}">
<input type="text" name="receptor" class="form-control mb-2" placeholder="Receptor" value="{{c[7] if c else ''}}">

<div class="row">

<div class="col-md-3">
<input type="text" name="radicado_interno" class="form-control" placeholder="Radicado interno" value="{{c[8] if c else ''}}">
</div>

<div class="col-md-3">
<input type="text" name="radicado_externo" class="form-control" placeholder="Radicado externo" value="{{c[9] if c else ''}}">
</div>

<div class="col-md-3">
<input type="text" name="especialidad" class="form-control" placeholder="Especialidad" value="{{c[10] if c else ''}}">
</div>

<div class="col-md-3">
<input type="text" name="responsable" class="form-control" placeholder="Responsable" value="{{c[11] if c else ''}}">
</div>

</div>

<br>

<div class="row">

<div class="col-md-3">
<input type="text" name="prioridad" class="form-control" placeholder="Prioridad" value="{{c[12] if c else ''}}">
</div>

<div class="col-md-3">
<label>Fecha límite</label>
<input type="date" name="fecha_limite" class="form-control" value="{{c[13] if c else ''}}">
</div>

<div class="col-md-3">
<input type="number" name="dias_respuesta" class="form-control" placeholder="Días respuesta" value="{{c[14] if c else ''}}">
</div>

<div class="col-md-3">
<label>
<input type="checkbox" name="respondida" value="1" {% if c and c[16]==1 %}checked{% endif %}>
Respondida
</label>
</div>

</div>

<br>

<textarea name="observaciones" class="form-control" placeholder="Observaciones">{{c[15] if c else ''}}</textarea>

<br>

<button class="btn btn-success">Guardar</button>
<a href="/" class="btn btn-secondary">Volver</a>

</form>

</div>
</body>
</html>
