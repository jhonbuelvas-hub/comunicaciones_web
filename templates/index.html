<!DOCTYPE html>
<html>
<head>
    <title>Comunicaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">📨 Sistema Contractual</span>

        <div>
            <a href="/" class="btn btn-light btn-sm">Comunicaciones</a>
            <a href="/nueva" class="btn btn-success btn-sm">+ Nueva</a>
            <a href="#" class="btn btn-warning btn-sm">Dashboard</a>
            <a href="#" class="btn btn-info btn-sm">Usuarios</a>
            <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

<table class="table table-bordered">

<tr>
<th>ID</th><th>Fecha</th><th>Radicado</th><th>Tipo</th>
<th>Asunto</th><th>Acciones</th>
</tr>

{% for c in comunicaciones %}
<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
<td>
    <a href="/editar/{{c[0]}}" class="btn btn-sm btn-primary">Editar</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
