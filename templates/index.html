<!DOCTYPE html>
<html>
<head>
<title>Sistema</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">Sistema Contractual</span>

<div>
<a href="/" class="btn btn-light btn-sm">Comunicaciones</a>
<a href="#" class="btn btn-warning btn-sm">Controversias</a>
<a href="#" class="btn btn-info btn-sm">Usuarios</a>
<a href="#" class="btn btn-secondary btn-sm">Dashboard</a>
<a href="/logout" class="btn btn-danger btn-sm">Salir</a>
</div>

</div>
</nav>

<div class="container mt-4">

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<a class="nav-link {% if filtro=='todas' %}active{% endif %}" href="/?filtro=todas">Todas</a>
</li>

<li class="nav-item">
<a class="nav-link {% if filtro=='recibidas' %}active{% endif %}" href="/?filtro=recibidas">Recibidas</a>
</li>

<li class="nav-item">
<a class="nav-link {% if filtro=='enviadas' %}active{% endif %}" href="/?filtro=enviadas">Enviadas</a>
</li>

<li class="nav-item ms-auto">
<a href="/nueva" class="btn btn-success btn-sm">+ Nueva</a>
</li>

</ul>

<table class="table table-bordered">

<tr>
<th>ID</th><th>Fecha</th><th>Radicado</th><th>Tipo</th><th>Asunto</th><th>Acciones</th>
</tr>

{% for c in comunicaciones %}
<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>

<td>
<a href="/editar/{{c[0]}}" class="btn btn-primary btn-sm">Editar</a>
</td>

</tr>
{% endfor %}

</table>

</div>
</body>
</html>
