<!DOCTYPE html>
<html>
<head>
<title>{{accion}}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3>{{accion}} Comunicación</h3>

<form method="post">

<input type="date" name="fecha" class="form-control mb-2" value="{{c[1] if c else ''}}">
<input type="text" name="radicado" class="form-control mb-2" placeholder="Radicado" value="{{c[2] if c else ''}}">

<select name="tipo" class="form-control mb-2">
<option>RECIBIDA</option>
<option>ENVIADA</option>
</select>

<input type="text" name="asunto" class="form-control mb-2" value="{{c[4] if c else ''}}">
<input type="text" name="emisor" class="form-control mb-2" value="{{c[5] if c else ''}}">
<input type="text" name="receptor" class="form-control mb-2" value="{{c[6] if c else ''}}">

<button class="btn btn-success">Guardar</button>
<a href="/" class="btn btn-secondary">Volver</a>

</form>

</div>
</body>
</html>
